  <main class="main-content">
    <div class="page-header">
      <div class="flex items-center justify-between">
        <div>
          <h1>📋 Historial</h1>
          <p>Registro de todas tus operaciones recientes.</p>
        </div>
        <button class="btn btn-secondary" id="clear-history-btn">🗑 Limpiar historial</button>
      </div>
    </div>

    <div id="history-list"></div>

<div id="toast-container"></div>
<script src="app.js"></script>
<script>
  async function loadHistory() {
    const history = await window.electronAPI.getHistory();
    const container = document.getElementById('history-list');

    if (history.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📂</div>
          <h4>Sin operaciones registradas</h4>
          <p>Usa alguna herramienta para ver el historial aquí</p>
        </div>`;
      return;
    }

    const typeLabels = { merge: 'Unificar', split: 'Dividir', convert: 'Convertir' };
    const badgeClass = { merge: 'badge-merge', split: 'badge-split', convert: 'badge-convert' };

    container.innerHTML = history.map(h => `
      <div class="history-item" style="margin-bottom:8px;">
        <span class="history-type-badge ${badgeClass[h.type]}">${typeLabels[h.type]}</span>
        <div class="file-info">
          <div class="file-name">${h.description}</div>
          <div class="file-size">${new Date(h.date).toLocaleString('es-MX')}</div>
        </div>
        ${h.outputPath ? `<button class="btn btn-secondary btn-sm" onclick="window.electronAPI.showItemInFolder('${h.outputPath.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">📂 Ver</button>` : ''}
      </div>
    `).join('');
  }

  document.getElementById('clear-history-btn').addEventListener('click', async () => {
    if (!confirm('¿Seguro que deseas limpiar todo el historial?')) return;
    await window.electronAPI.clearHistory();
    showToast('Historial limpiado', 'info');
    loadHistory();
  });

  loadHistory();
</script>
